<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Movies - StreamHub</title>
  <link rel="stylesheet" href="style.css">
  <meta name="keywords" content="streaming, movies, watch online, all movies">
  <meta name="description" content="Browse all movies">
</head>
<body>
  <!-- Animated Background -->
  <div id="bgAnimation" class="bg-animation"></div>

  <!-- Header -->
  <header class="header" id="header">
    <nav class="navbar">
      <div class="nav-left">
        <a href="index.html" class="logo">🎬 StreamHub</a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="steam.html" class="active">All Movies</a></li>
          <li><a href="index.html#trending">Trending</a></li>
          <li><a href="index.html#continue-watching">Continue</a></li>
        </ul>
      </div>
      <div class="nav-right">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search movies..." />
          <button id="searchBtn" class="icon-btn">🔍</button>
        </div>
        <a href="index.html" class="icon-btn" title="Home">🏠</a>
      </div>
    </nav>
  </header>

  <!-- Filters Section -->
  <section id="filters" class="section filters-section">
    <div class="container">
      <div class="filters-container">
        <div class="filter-group">
          <label>Genre:</label>
          <select id="genreFilter"><option value="">All</option></select>
        </div>
        <div class="filter-group">
          <label>Language:</label>
          <select id="languageFilter"><option value="">All</option></select>
        </div>
        <div class="filter-group">
          <label>Year:</label>
          <select id="yearFilter"><option value="">All</option></select>
        </div>
        <div class="filter-group">
          <label>Quality:</label>
          <select id="qualityFilter">
            <option value="">All</option>
            <option value="4K">4K</option>
            <option value="1080P">1080P</option>
            <option value="720P">720P</option>
            <option value="480P">480P</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Sort By:</label>
          <select id="sortFilter">
            <option value="latest">Latest</option>
            <option value="rating">Rating</option>
            <option value="name">Name</option>
            <option value="views">Views</option>
          </select>
        </div>
        <button id="resetFilters" class="btn btn-secondary">Reset</button>
      </div>
      <div class="results-count" id="resultsCount"></div>
    </div>
  </section>

  <!-- All Movies Grid -->
  <section id="all-movies" class="section">
    <div class="container">
      <h2 class="section-title">🎬 All Movies</h2>
      <div class="movies-grid" id="allMoviesGrid"></div>
    </div>
  </section>

  <!-- Back to Top Button -->
  <button id="backToTop" class="back-to-top" style="display:none;">↑</button>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div>
          <h4>🎬 StreamHub</h4>
          <p>Premium movie experience.</p>
        </div>
        <div>
          <h4>Quick Links</h4>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#trending">Trending</a></li>
            <li><a href="#continue-watching">Continue Watching</a></li>
          </ul>
        </div>
        <div>
          <h4>Social</h4>
          <ul>
            <li><a href="#">Twitter</a></li>
            <li><a href="#">Instagram</a></li>
            <li><a href="#">YouTube</a></li>
          </ul>
        </div>
      </div>
      <p class="copyright">© 2026 StreamHub. All rights reserved.</p>
    </div>
  </footer>

  <script>
    // ============================================================
    // MOVIE VIEWER PAGE (steam.html)
    // ============================================================
    
    let movies = { list: [], featured: null, settings: {} };
    let currentFilteredMovies = [];

    // Utility functions
    function $(selector) { return document.querySelector(selector); }
    function showToast(message, type = 'info') {
      const container = $('#toastContainer');
      if (!container) return;
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Load movies
    async function loadMovies() {
      try {
        const response = await fetch('movies.json');
        if (!response.ok) throw new Error('Failed to load movies.json');
        const data = await response.json();
        movies = data;
        currentFilteredMovies = movies.list.filter(m => !m.hideMovie);
        console.log(`%c✅ Loaded ${movies.list.length} movies`, 'color: #00d4ff; font-weight: bold;');
        return true;
      } catch (error) {
        console.error('Error:', error);
        alert('Failed to load movies.json');
        return false;
      }
    }

    // Create movie card
    function createMovieCard(movie) {
      const card = document.createElement('div');
      card.className = 'movie-card glass';
      card.dataset.id = movie.id;
      card.innerHTML = `
        <img src="${movie.poster || ''}" alt="${movie.title}" loading="lazy" 
             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22300%22%3E%3Crect fill=%22%23252540%22 width=%22200%22 height=%22300%22/%3E%3Ctext fill=%22%23666%22 x=%22100%22 y=%22150%22 text-anchor=%22middle%22%3ENo Image%3C/text%3E%3C/svg%3E'" />
        ${movie.quality === '4K' ? '<span class="badge quality-badge" style="position:absolute; top:10px; right:10px; z-index:2;">4K</span>' : ''}
        ${movie.isNewRelease ? '<span class="badge new" style="position:absolute; top:10px; left:10px; z-index:2;">NEW</span>' : ''}
        <div class="card-overlay">
          <h3>${movie.title}</h3>
          <span class="card-meta">${movie.year || 'N/A'} · ${movie.quality || 'N/A'} · ⭐ ${movie.rating || 'N/A'}</span>
          <div style="margin-top:0.5rem;">
            ${movie.genres && movie.genres.slice(0, 2).map(g => `<span class="tag" style="font-size:0.7rem; padding:0.2rem 0.5rem; margin-right:0.3rem;">${g}</span>`).join('') || ''}
          </div>
        </div>
        <button class="watch-btn" data-id="${movie.id}">▶</button>
      `;
      card.querySelector('.watch-btn').onclick = (e) => {
        e.stopPropagation();
        window.open(`index.html?movie=${movie.id}`, '_self');
      };
      card.onclick = () => {
        window.open(`index.html?movie=${movie.id}`, '_self');
      };
      return card;
    }

    // Populate filters
    function populateFilters() {
      const genres = new Set();
      const languages = new Set();
      const years = new Set();
      
      movies.list.forEach(m => {
        if (m.genres) m.genres.forEach(g => genres.add(g));
        if (m.language) languages.add(m.language);
        if (m.year) years.add(m.year);
      });

      const genreFilter = $('#genreFilter');
      const languageFilter = $('#languageFilter');
      const yearFilter = $('#yearFilter');
      
      if (genreFilter) {
        Array.from(genres).sort().forEach(g => {
          const opt = document.createElement('option');
          opt.value = g;
          opt.textContent = g;
          genreFilter.appendChild(opt);
        });
      }
      
      if (languageFilter) {
        Array.from(languages).sort().forEach(l => {
          const opt = document.createElement('option');
          opt.value = l;
          opt.textContent = l;
          languageFilter.appendChild(opt);
        });
      }
      
      if (yearFilter) {
        Array.from(years).sort((a, b) => b - a).forEach(y => {
          const opt = document.createElement('option');
          opt.value = y;
          opt.textContent = y;
          yearFilter.appendChild(opt);
        });
      }

      // Event listeners
      ['genreFilter', 'languageFilter', 'yearFilter', 'qualityFilter', 'sortFilter'].forEach(id => {
        const el = $('#' + id);
        if (el) el.onchange = applyFilters;
      });

      const resetBtn = $('#resetFilters');
      if (resetBtn) resetBtn.onclick = resetFilters;
    }

    // Apply filters
    function applyFilters() {
      const genre = $('#genreFilter')?.value || '';
      const language = $('#languageFilter')?.value || '';
      const year = $('#yearFilter')?.value || '';
      const quality = $('#qualityFilter')?.value || '';
      const sort = $('#sortFilter')?.value || 'latest';

      let filtered = movies.list.filter(m => {
        if (m.hideMovie) return false;
        if (genre && (!m.genres || !m.genres.includes(genre))) return false;
        if (language && m.language !== language) return false;
        if (year && m.year !== year) return false;
        if (quality && m.quality !== quality) return false;
        return true;
      });

      // Sort
      switch (sort) {
        case 'rating':
          filtered.sort((a, b) => parseFloat(b.rating || 0) - parseFloat(a.rating || 0));
          break;
        case 'name':
          filtered.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
          break;
        case 'views':
          filtered.sort((a, b) => (b.views || 0) - (a.views || 0));
          break;
        default:
          filtered.sort((a, b) => (b.id || 0) - (a.id || 0));
      }

      currentFilteredMovies = filtered;
      renderMovies(filtered);
      showToast(`Found ${filtered.length} movies`, 'success');
    }

    // Reset filters
    function resetFilters() {
      ['genreFilter', 'languageFilter', 'yearFilter', 'qualityFilter'].forEach(id => {
        const el = $('#' + id);
        if (el) el.value = '';
      });
      const sortFilter = $('#sortFilter');
      if (sortFilter) sortFilter.value = 'latest';
      applyFilters();
      showToast('Filters reset', 'info');
    }

    // Render movies
    function renderMovies(movieList) {
      const grid = $('#allMoviesGrid');
      if (!grid) return;

      grid.innerHTML = '';
      
      if (movieList.length === 0) {
        grid.innerHTML = '<p style="color: var(--text-secondary); text-align:center; padding:3rem;">No movies found. Try adjusting your filters.</p>';
        return;
      }

      movieList.forEach(movie => {
        grid.appendChild(createMovieCard(movie));
      });

      // Update results count
      const resultsCount = $('#resultsCount');
      if (resultsCount) {
        resultsCount.textContent = `Showing ${movieList.length} of ${movies.list.length} movies`;
      }
    }

    // Search functionality
    function searchMovies() {
      const query = $('#searchInput').value.toLowerCase();
      if (!query) {
        applyFilters();
        return;
      }

      const results = movies.list.filter(m => 
        !m.hideMovie && (
          m.title.toLowerCase().includes(query) ||
          (m.genres && m.genres.some(g => g.toLowerCase().includes(query))) ||
          (m.cast && m.cast.some(c => c.toLowerCase().includes(query)))
        )
      );

      currentFilteredMovies = results;
      renderMovies(results);
      showToast(`Found ${results.length} movies`, 'success');
    }

    // Back to top
    function setupBackToTop() {
      const btn = $('#backToTop');
      if (!btn) return;
      
      window.onscroll = () => {
        btn.style.display = window.scrollY > 300 ? 'block' : 'none';
      };
      btn.onclick = () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      const loaded = await loadMovies();
      if (loaded) {
        populateFilters();
        renderMovies(currentFilteredMovies);
        setupBackToTop();

        // Search listeners
        const searchBtn = $('#searchBtn');
        const searchInput = $('#searchInput');
        if (searchBtn) searchBtn.onclick = searchMovies;
        if (searchInput) {
          searchInput.onkeypress = (e) => {
            if (e.key === 'Enter') searchMovies();
          };
        }

        console.log('%c🎬 All Movies Page Ready', 'color: #00d4ff; font-weight: bold;');
      }
    });
  </script>
</body>
</html>
